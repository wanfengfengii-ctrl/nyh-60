<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}古井汲水效率复原平台{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="/" class="logo">
                <span class="logo-icon">⌘</span>
                <span class="logo-text">古井汲水效率复原平台</span>
            </a>
            <nav class="main-nav">
                <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">古井档案</a>
                <a href="/review-center" class="nav-link {% if request.url.path == '/review-center' %}active{% endif %}">
                    待复核中心
                    {% if pending_count is defined and pending_count > 0 %}
                    <span class="nav-badge">{{ pending_count }}</span>
                    {% endif %}
                </a>
                <a href="/labor-analysis" class="nav-link {% if request.url.path == '/labor-analysis' %}active{% endif %}">劳作负荷分析</a>
                <a href="/hydro-environment" class="nav-link {% if request.url.path == '/hydro-environment' %}active{% endif %}">水文环境研究</a>
                <a href="/scene-optimization" class="nav-link {% if request.url.path == '/scene-optimization' %}active{% endif %}">场景优化复原</a>
                <a href="/comparison" class="nav-link {% if request.url.path == '/comparison' %}active{% endif %}">古井对比</a>
                <a href="/reports" class="nav-link {% if request.url.path == '/reports' %}active{% endif %}">研究报告</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <p>© 2026 古井汲水效率复原平台 · 传统工艺研究工具</p>
        </div>
    </footer>

    <div id="toast-container"></div>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
